openapi: 3.1.0
info:
  title: Tolka Medical Translation API
  version: 1.0.0
  description: >
    Privacy-first medical translation API with back-translation validation,
    risk scoring, and clinical context awareness. No patient data is stored.
  contact:
    name: Tolka Engineering
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://tolka-api.fly.dev
    description: Production (EU — Frankfurt)

security:
  - BearerAuth: []

tags:
  - name: Translation
    description: Medical translation  with back-translation verification
  - name: Session
    description: Conversation session management
  - name: Admin
    description: API key management and usage statistics
  - name: Health
    description: Server health and readiness checks

# ──────────────────────────────────────────
# Paths
# ──────────────────────────────────────────

paths:
  /v1/medical/translate:
    post:
      operationId: translate
      tags: [Translation]
      summary: Translate medical text with back-translation verification
      description: >
        Core translation endpoint. Runs the full 5-step pipeline: forward translation,
        back-translation, semantic comparison, risk scoring, and enriched response.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslateRequest'
      responses:
        '200':
          description: Translation completed (may be verified or unverified)
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            Idempotent-Replay:
              $ref: '#/components/headers/Idempotent-Replay'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/medical/safe-translate:
    post:
      operationId: safeTranslate
      tags: [Translation]
      summary: Translate with forced safe mode
      description: >
        Same as /translate but forces safe mode regardless of the request body's mode field.
        Low-confidence translations are withheld with a suggestion to rephrase.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslateRequest'
      responses:
        '200':
          description: Translation completed or refused (safe mode)
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            Idempotent-Replay:
              $ref: '#/components/headers/Idempotent-Replay'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/medical/session:
    post:
      operationId: createSession
      tags: [Session]
      summary: Create a conversation session
      description: >
        Creates an encrypted client-side session token with clinical context.
        Token has a 15-minute idle TTL and 60-minute hard maximum.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        '200':
          description: Session created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            Idempotent-Replay:
              $ref: '#/components/headers/Idempotent-Replay'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/keys:
    get:
      operationId: listApiKeys
      tags: [Admin]
      summary: List API keys for the authenticated organization
      description: Returns key metadata only — full keys are never retrievable after creation.
      responses:
        '200':
          description: List of API key metadata
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKeyMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createApiKey
      tags: [Admin]
      summary: Create a new API key
      description: >
        The full key is returned exactly once in this response.
        Store it securely — it cannot be retrieved again.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  maxLength: 100
                  description: Optional human-readable label for the key
              additionalProperties: false
      responses:
        '201':
          description: API key created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            Idempotent-Replay:
              $ref: '#/components/headers/Idempotent-Replay'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/keys/{id}/rotate:
    post:
      operationId: rotateApiKey
      tags: [Admin]
      summary: Rotate an API key
      description: >
        Creates a new key. The old key remains active until explicitly revoked
        via DELETE, enabling zero-downtime rotation.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the key to rotate
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: New key created, old key still active
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            Idempotent-Replay:
              $ref: '#/components/headers/Idempotent-Replay'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiKeyCreateResponse'
                  - type: object
                    required: [old_key_id, message]
                    properties:
                      old_key_id:
                        type: string
                        description: ID of the key being rotated
                      message:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Key not found or does not belong to this organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TolkaErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [Admin]
      summary: Revoke an API key
      description: >
        Permanently revokes the key. Cannot revoke the last active key for
        an organization — at least one must remain active.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the key to revoke
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Key revoked successfully
          headers:
            Idempotent-Replay:
              $ref: '#/components/headers/Idempotent-Replay'
        '400':
          description: Cannot revoke the last active key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TolkaErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/usage:
    get:
      operationId: getUsage
      tags: [Admin]
      summary: Get usage statistics for the organization
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Start date (ISO format, e.g. 2024-01-01). Defaults to 30 days ago.
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: End date (ISO format). Defaults to today.
      responses:
        '200':
          description: Usage records for the date range
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/json:
              schema:
                type: object
                required: [usage]
                properties:
                  usage:
                    type: array
                    items:
                      $ref: '#/components/schemas/UsageRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Basic health check
      security: []
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok

  /ready:
    get:
      operationId: readinessCheck
      tags: [Health]
      summary: Readiness check including database connectivity
      security: []
      responses:
        '200':
          description: Server is ready to accept requests
          content:
            application/json:
              schema:
                type: object
                required: [status, database]
                properties:
                  status:
                    type: string
                    const: ready
                  database:
                    type: boolean
        '503':
          description: Server is not ready (database unavailable)
          content:
            application/json:
              schema:
                type: object
                required: [status, database]
                properties:
                  status:
                    type: string
                    const: unavailable
                  database:
                    type: boolean

# ──────────────────────────────────────────
# Components
# ──────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        API key with `sk_live_` (production) or `sk_test_` (development) prefix.
        Pass as `Authorization: Bearer sk_live_...`

  headers:
    X-Request-Id:
      description: Unique request identifier for tracing
      schema:
        type: string
        format: uuid
    X-RateLimit-Limit:
      description: Maximum requests per minute for this organization
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Remaining requests in the current window
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix timestamp (seconds) when the rate limit window resets
      schema:
        type: integer
    Idempotent-Replay:
      description: >
        Present only on responses replayed from the idempotency cache. Value
        is always `"true"`. Absent on a freshly-computed response.
      schema:
        type: string
        enum: [true]

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 256
      description: >
        Optional client-generated idempotency key (UUIDv4 recommended).
        Repeating the same key within 24 hours, scoped to your organization,
        replays the original 2xx response verbatim and stamps
        `Idempotent-Replay: true` on the response. 4xx and 5xx responses are
        NOT cached — clients may safely retry transient failures with the
        same key.

        Honored only when the server is configured with shared-store Redis
        (UPSTASH_REDIS_REST_URL + UPSTASH_REDIS_REST_TOKEN). When Redis is
        absent the header is silently ignored and every request processes
        normally.

  responses:
    BadRequest:
      description: >
        Invalid request. Possible `error_code` values include
        `invalid_request` (Ajv validation failure),
        `invalid_language_pair` (source equals target),
        `session_invalid` / `session_expired` (bad / aged session token),
        `text_too_long` (estimated token count exceeds the per-language
        budget — Latin inputs fit comfortably at the 2000-character schema
        cap; Cyrillic and Arabic may be rejected earlier).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TolkaErrorResponse'
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TolkaErrorResponse'
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the rate limit resets
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TolkaErrorResponse'
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TolkaErrorResponse'
    ServiceUnavailable:
      description: Translation service temporarily unavailable (LLM provider down)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TolkaErrorResponse'

  schemas:
    # ── Enums ────────────────────────────────

    LanguageCode:
      type: string
      enum: [no, ar, so, pl, uk, en]
      description: 'Supported language codes: Norwegian, Arabic, Somali, Polish, Ukrainian, English'

    ClinicalDomain:
      type: string
      enum: [emergency, gp, specialist, mental_health, physical_therapy]

    Speaker:
      type: string
      enum: [doctor, nurse, patient, paramedic]

    Intent:
      type: string
      enum: [diagnosis_question, instruction, history_taking, consent]

    TranslateMode:
      type: string
      enum: [safe, standard]

    RiskLevel:
      type: string
      enum: [low, medium, high, critical, unknown]

    RiskFlagType:
      type: string
      enum: [keyword_mismatch, negation_flip, numerical_change, ambiguity]

    RiskFlagSeverity:
      type: string
      enum: [warning, critical]

    # ── Clinical Context ─────────────────────

    ClinicalContext:
      type: object
      properties:
        domain:
          $ref: '#/components/schemas/ClinicalDomain'
        speaker:
          $ref: '#/components/schemas/Speaker'
        intent:
          $ref: '#/components/schemas/Intent'
      additionalProperties: false

    # ── Translation ──────────────────────────

    TranslateRequest:
      type: object
      required: [source_language, target_language, text, mode]
      properties:
        source_language:
          $ref: '#/components/schemas/LanguageCode'
        target_language:
          $ref: '#/components/schemas/LanguageCode'
        text:
          type: string
          minLength: 1
          maxLength: 2000
        mode:
          $ref: '#/components/schemas/TranslateMode'
        context:
          $ref: '#/components/schemas/ClinicalContext'
        session_token:
          type: string
          description: Encrypted session token from POST /v1/medical/session
      additionalProperties: false

    RiskFlag:
      type: object
      required: [type, detail, severity]
      properties:
        type:
          $ref: '#/components/schemas/RiskFlagType'
        detail:
          type: string
        severity:
          $ref: '#/components/schemas/RiskFlagSeverity'

    ResponseMetadata:
      type: object
      required: [latency_ms, model, request_id]
      properties:
        latency_ms:
          type: number
          description: Total pipeline latency in milliseconds
        model:
          type: string
          description: LLM model used for forward translation (or "phrase-library")
        request_id:
          type: string
          description: Matches the X-Request-Id response header

    TranslateResponse:
      type: object
      required:
        [translation, back_translation, confidence, risk, flags, alternatives, verified, metadata]
      properties:
        translation:
          type: ['string', 'null']
          description: Forward translation, or null if refused in safe mode
        back_translation:
          type: ['string', 'null']
          description: Back-translation to source language, or null if unavailable
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: 'Weighted confidence score combining lexical, semantic, and keyword preservation analysis. Range 0.0–1.0. Higher is better.'
        risk:
          $ref: '#/components/schemas/RiskLevel'
        flags:
          type: array
          items:
            $ref: '#/components/schemas/RiskFlag'
          description: Risk flags detected during safety evaluation
        alternatives:
          type: array
          items:
            type: string
          description: Reserved for future simplified alternatives
        suggestion:
          type: string
          description: Present on safe-mode refusals — guidance for rephrasing
        verified:
          type: boolean
          description: Whether the translation was verified via back-translation
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    # ── Session ──────────────────────────────

    SessionCreateRequest:
      type: object
      required: [context]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/ClinicalContext'
            - required: [domain, speaker]
      additionalProperties: false

    SessionCreateResponse:
      type: object
      required: [session_token, expires_at]
      properties:
        session_token:
          type: string
          description: Encrypted session token (base64url). Pass to translate endpoints.
        expires_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the session expires (hard TTL — 60 minutes)

    # ── Admin ────────────────────────────────

    ApiKeyMetadata:
      type: object
      required: [id, org_id, key_prefix, label, is_active, created_at, revoked_at]
      properties:
        id:
          type: string
        org_id:
          type: string
        key_prefix:
          type: string
          description: First 12 characters of the key for identification
        label:
          type: ['string', 'null']
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: ['string', 'null']
          format: date-time

    ApiKeyCreateResponse:
      type: object
      required: [key, id, key_prefix, label]
      properties:
        key:
          type: string
          description: Full API key — returned exactly once at creation. Store securely.
        id:
          type: string
        key_prefix:
          type: string
        label:
          type: ['string', 'null']

    UsageRecord:
      type: object
      required: [org_id, date, request_count, error_count, avg_confidence, avg_latency_ms]
      properties:
        org_id:
          type: string
        date:
          type: string
          format: date
        request_count:
          type: integer
        error_count:
          type: integer
        avg_confidence:
          type: ['number', 'null']
        avg_latency_ms:
          type: ['number', 'null']

    # ── Errors ───────────────────────────────

    TolkaErrorResponse:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
          description: Machine-readable error code (e.g. unauthorized, rate_limited, invalid_request)
        message:
          type: string
          description: Human-readable error description
        suggestion:
          type: string
          description: Optional guidance for resolving the error
        fields:
          type: string
          description: Comma-separated list of invalid fields (present on validation errors only)
